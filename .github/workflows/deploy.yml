name: Deploy to Cloud Run

on:
  push:
    branches:
      - main

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  SERVICE_NAME: andora-app
  REGION: us-central1
  IMAGE: us-central1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/andora-app/andora-app

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        run: |
          echo "${{ secrets.GCP_SA_KEY }}" | base64 -d > /tmp/sa_key.json
          gcloud auth activate-service-account --key-file=/tmp/sa_key.json
          gcloud config set project ${{ secrets.GCP_PROJECT_ID }}

      - name: Configure Docker for Artifact Registry
        run: |
          gcloud auth list
          gcloud auth print-access-token | docker login -u oauth2accesstoken --password-stdin us-central1-docker.pkg.dev
          cat ~/.docker/config.json

      - name: Build Docker image
        run: |
          docker build \
            -t ${{ env.IMAGE }}:${{ github.sha }} \
            -t ${{ env.IMAGE }}:latest \
            ./BE

      - name: Test AR access
        run: |
          TOKEN=$(gcloud auth print-access-token)
          echo "Token email:"
          curl -s "https://www.googleapis.com/oauth2/v1/tokeninfo?access_token=$TOKEN" | python3 -m json.tool
          echo "AR repository access:"
          curl -s -w "\nHTTP:%{http_code}" \
            -H "Authorization: Bearer $TOKEN" \
            "https://artifactregistry.googleapis.com/v1/projects/$PROJECT_ID/locations/us-central1/repositories/andora-app"

      - name: Push Docker image
        run: |
          docker push ${{ env.IMAGE }}:${{ github.sha }}
          docker push ${{ env.IMAGE }}:latest

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy ${{ env.SERVICE_NAME }} \
            --image ${{ env.IMAGE }}:${{ github.sha }} \
            --region ${{ env.REGION }} \
            --platform managed \
            --allow-unauthenticated \
            --port 8080 \
            --project=${{ secrets.GCP_PROJECT_ID }} \
            --set-env-vars "JwtSettings__Key=${{ secrets.JWT_KEY }},EmailSettings__ResendApiKey=${{ secrets.RESEND_API_KEY }},MongoSettings__ConnectionString=${{ secrets.MONGO_CONNECTION_STRING }}"
